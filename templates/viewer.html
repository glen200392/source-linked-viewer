<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Viewer</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="viewer-page">
  <!-- Top bar -->
  <header class="viewer-header">
    <a href="/" class="back-link">&larr; 報告列表</a>
    <h1 id="report-title">載入中...</h1>
    <div class="header-actions">
      <span id="citation-count" class="badge"></span>
      <button id="toggle-citations-btn" class="header-btn" title="引用列表 (C)">☰</button>
    </div>
  </header>

  <!-- Split pane container -->
  <div class="split-container">
    <!-- Left: Report -->
    <div class="pane pane-left" id="report-pane">
      <div class="pane-toolbar">
        <span class="pane-label">研究報告</span>
        <span class="pane-hint">← → 切換引用  |  Esc 清除</span>
      </div>
      <div class="pane-content" id="report-content">
        <p class="loading">載入報告中...</p>
      </div>
    </div>

    <!-- Resize handle -->
    <div class="resize-handle" id="resize-handle">
      <div class="handle-grip"></div>
    </div>

    <!-- Right: Source viewer -->
    <div class="pane pane-right" id="source-pane">
      <div class="pane-toolbar">
        <span class="pane-label" id="source-label">來源檢視</span>
        <a id="source-external-link" href="#" target="_blank" class="external-link" style="display:none">
          ↗ 開啟原始連結
        </a>
      </div>
      <div class="pane-content" id="source-content">
        <div class="source-placeholder">
          <div class="placeholder-icon">🔍</div>
          <p>點選左側報告中的引用編號</p>
          <p class="placeholder-hint">例如 <code>[1]</code>、<code>[2]</code></p>
          <p class="placeholder-hint">或使用 <code>←</code> <code>→</code> 鍵瀏覽</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Citation list panel (collapsible) -->
  <div id="citation-list-panel" class="citation-list-panel collapsed">
    <div class="citation-list-header">
      <span>引用來源</span>
      <button id="close-citations-btn" class="close-btn">&times;</button>
    </div>
    <div id="citation-list" class="citation-list"></div>
  </div>

  <!-- Citation tooltip (floating) -->
  <div id="citation-tooltip" class="citation-tooltip" style="display:none">
    <div class="tooltip-title" id="tooltip-title"></div>
    <div class="tooltip-quote" id="tooltip-quote" style="display:none"></div>
    <div class="tooltip-url" id="tooltip-url"></div>
    <div class="tooltip-type" id="tooltip-type"></div>
  </div>

  <script>
    const REPORT_ID = "{{ report_id }}";

    // Citation list panel toggle
    document.getElementById("toggle-citations-btn").addEventListener("click", () => {
      document.getElementById("citation-list-panel").classList.toggle("collapsed");
    });
    document.getElementById("close-citations-btn").addEventListener("click", () => {
      document.getElementById("citation-list-panel").classList.add("collapsed");
    });
    // Keyboard shortcut: C to toggle
    document.addEventListener("keydown", (e) => {
      if (e.key === "c" && e.target.tagName !== "INPUT" && e.target.tagName !== "TEXTAREA") {
        document.getElementById("citation-list-panel").classList.toggle("collapsed");
      }
    });
  </script>
  <script src="/static/js/viewer.js"></script>
</body>
</html>
